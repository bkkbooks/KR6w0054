body:
  text: 今某年某月某日弟毗盧郍佛奉請圎滿報身盧百億化身同名釋迦𡰱佛奉請東方十二上藥師請西方極樂世界阿陀佛奉請歡喜藏摩𡰱寶下生勒尊佛奉請琉璃金山寶華照吉祥佛奉請大聖文殊師利菩薩奉請大聖普賢菩薩奉請如意輪菩薩奉請大悲觀世音菩薩奉請大慈大勢智菩薩奉請大悲地藏菩又奉請過現未來十方三世一切諸奉請十二部尊經甚深藏奉請諸大菩薩摩訶藏奉請聲聞緣覺一切賢聖奉請清涼山頂一万聖慈地上地前證真菩薩奉請摩離耶山五百羅漢四向四果得道沙門分斷俱詮通大聖右弟子某甲奉為國安人泰社會昌五稼盈三農倍稔先魂識不值八難之中過往尊親無歷三塗之苦次奉為弟子某甲祥溢壽免殃不于己身嵗年昌橫禍𢙣桑于戶側令彰長幼長銜𮫭水之歡內外親永保藂花之茂謹奉請如上大慈悲法父三界尊師應供聖真隨念大士伏雲飛雨驟化蓮神通來降道場潛隱迹證盟弟子某甲功德隨喜結壇轉經受斯呪供錢財鑒領香花五穀增長弟子某甲福園春卉隨日而生除蕩弟子某甲災此秋林逐風而落千祥輻輳万善更行所求遂心功德圓滿敬禮常住三寶又更啓請東方提頭賴吒天王主領一切𠃵闥婆神毗舍闍鬼并諸眷屬來降道場又請南方毗樓勒義天王主領一切毗𭜴多鬼并諸眷屬來降道場又請西方毗樓義天王主領一切諸大毒龍及富單郍鬼并諸眷屬來降道場又請北方大聖毗沙門天王主領一切夜義羅剎諸𢙣鬼神并諸眷屬來降道場又請上方釋提桓因主領一切日月天子星𪧐五官草八𪧐卅二神并諸眷屬來降道場又請下方堅牢地神主領一切山嶽靈江河聖族并諸眷屬來降道場又請護界善神散昉大將護伽藍神金剛密迹十二藥叉大將四海八大龍王管境土地神泉源行非水族鎮世五嶽之主鶉𦊆崛山神社公品官尊地水火風神等并諸眷屬來降道場右弟子某甲自云生居凡位長乃塵軀不諳靈異之間起住多違乖犯舉足動步晨昏往來不覺不知積過深重今恐禍患奔至害愚迷放災殃終于性命今弟子某甲虔恭懇禱悲悔交生露瞻披肝殷勤懺謝謹于某𩂜結壇燃燈誦呪轉經捨財散食三日三夜芳等經云七日七夜鈴梵鳴音念崇聲無息伏如上靈聖是衆生父母尊仰所有告至誠皆蒙獲益今並離于所樂發歡喜心賜大慈悲不違所請龍飛雨驟電擊雷奔眷屬隨相深生濟拔乘空著地感動山川來就道場證盟㓛德自弟子某甲乃捨割𥝠己抽捨淨財獻佛施僧廣𥘨品壇安像請僧轉經虔仰能仁濟危敷苦香果万般飲食散而須無窮種五穀錢財施而塵沙不𥁞銀盤花動紅蓮捧而昭歸金瓶水流大海飲而無竭所有年裏困厄隨呪聲而霞消日瘴時災經音而霧散怨家債主歡喜相辭負命掌恩永休讎對敬禮常住三寶然後誦勸請發文以此結壇轉經㓛德誦呪散食勝因燃燈供養等偈錢財五穀福牽先奉為龍天八部護國護人釋梵四王凃除法輪常轉佛日重興社安寧豐盈稼積又持福次用莊嚴弟子某甲即體惟滄溟比壽富貴而山嶽無移福並松筠貞實而春冬不變門興万善千祥膺而長榮家謙三𮏂百寶鎮而永固男忠女孝災殃不近于義行子貴孫昌禍害無于善先七祖蓮花迎而登天不歷三塗祥雲乘而證果家中若大若小受金剛不壞之身拔眷內親外親共保清平之樂莊盈五穀霜疸不于田苗圈滿群昌六畜無災于牧廡怨親債主早已休讎負命負財為生罷散敬禮常住三寶然後呪師自擎盤取三發呪印加持便送出第二盤食右弟子某甲旬結壇散食誦呪轉經焚香燃燈三日三夜者遂請下方窈冥神理隂道官寮閻魔羅王察命司録太山府主五道大神左膊右肩善𢙣童子鑒齋巡使行道天王吸氣收魂判命主吏六司都長行病鬼王內外通申諸方獄卒又請四神八將十二部官太歲將軍日遊月建黑赤星神山靈異水陸神仙宮殿非人樓臺魍魎等并諸眷屬並捨于所樂離于所居來就道場領斯福分弟子自云凡夫迷暗每犯聖賢行住中間于日月神理今始覺悟遂結香壇散食燃燈轉經誦呪伏諸大神聖發慈悲救護生領受呪供錢財花果五穀香藥各生歡喜共開福門三災不行于道場之家九撗無于增善戶千年衛護長似今晨万歲吉祥轉禍為福敬禮常住三寶又弟子某甲自從無量劫來至于今日或有積主辜負或是見𠀍新熏所有債主怨家負財買命或是經山採獵手射傍生或是涉草歡遊烹于𤡢獸又請諸餘俘遊浪鬼因祀妖精杇樹丘墳擅行魍魎𢙣鬼毒主走火邪魂巡歷街坊吸人精氣或有斷親絶嗣不葬鬼或有離鄉失土波送鬼或有犯官驚魂鬼賊血醒鬼或是深泉溺死鬼大火燒然鬼或有無糧餓死鬼冬寒凍鬼散而須有餘錢財万般用而寶山無盡金瓶香水飲而四海不傾銀盞神燈照而三𡍼俱曉祥花數種持而天堂戶開月桂仙香焚而鑊湯火滅汝承此㓛德早遇龍花永離人間莫生惱害收弟子某甲三災九撗遠送他方除弟子某甲月厄年衰轉禍為福生世長為善品枝羅世生永保乃興人貴冥官自在記録福因照此一家永安三代敬禮常住三寶閻文百姓尚善住遊于都信捉水磑所存鐧在前自捉已後便須晝夜存心不其顯春秋須于于數填如若于捉磑人家用充顯祝用以為後憑捉磑戶高貟友見人兄高貟實癸丑年正月草三日捉磑戶高貟友管會壬子并周年沿磑諸𩂜破用及矜廗外欠麥碩一斗並在貟友身上限日便須填還引用為後憑欠顆人高貟友口承人姪高保德
