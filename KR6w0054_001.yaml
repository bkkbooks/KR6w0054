body:
  text: 今某年某月厶日弟毗盧郍佛奉請圎滿報身盧百億化身同名𥼶迦𡰱仏奉請東方十二上藥師請西方極樂世界阿陁仏奉請歡喜蔵摩𡰱寶下生勒尊仏奉請瑠璃金山寶華照吉祥仏奉請大聖文殊師利菩薩奉請大聖普賢菩薩奉請如意輪菩薩奉請大悲觀世音菩薩奉請大慈大勢智菩薩奉請大悲地蔵菩又奉請過現未来十方三世一切諸奉請十二部尊經甚深蔵奉請諸大菩薩摩訶蔵奉請聲聞緣覺一切賢聖奉請清凉山頂一万聖慈地上地前證真菩薩奉請摩離耶山五百羅漢四向四果得道沙門分断俱詮通大聖右弟子厶甲奉為國安人㤗社會昌五稼盈三農倍稔先魂識不值八難之中過往尊親無歷三塗之苦次奉為弟子厶甲祥溢壽免殃不扵己身嵗年昌橫禍𢙣桒扵戶側令彰長幼長銜𮫭水之歡內外親永保藂花之茂謹奉請如上大慈悲法父三界尊師應供聖真随念大士伏雲飛雨驟化蓮神通来降道塲潜隱跡證盟弟子厶甲功徳随喜結壇轉經受斯呪供錢財鑒領香花五糓增長弟子厶甲福园春卉随日而生除盪弟子厶甲灾此秋林逐風而落千祥輻輳万善更行所求遂心功德圓滿敬礼常住三寶又更啟請東方提頭頼吒天王主領一切𠃵闥婆神毗舎闍鬼并諸眷属来降道塲又請南方毗楼勒义天王主領一切毗𭜴多鬼并諸眷属来降道塲又請西方毗樓义天王主領一切諸大毒龍及富單郍鬼并諸眷屬来降道塲又請北方大聖毗沙門天王主領一切夜义羅𠛴諸𢙣鬼神并諸眷属来降道塲又請上方𥼶提桓因主領一切日月天子星𪧐五官廿八𪧐卅二神并諸眷属来降道塲又請下方堅牢地神主領一切山岳靈江河聖族并諸眷属来降道塲又請護界善神散昉大將護伽藍神金剛密跡十二藥叉大將四海八大龍王管境土地神泉源行非水族鎮世五岳之主鶉𦊆崛山神社公品官尊地水火風神等并諸眷属来降道塲右弟子厶甲自云生居凢位長乃塵軀不諳靈異之間起住多違乖犯舉足動步晨昏往来不覺不知積過深重今𢙢禍患奔至𡧱愚迷放灾殃終扵性命今弟子厶甲虔恭懇禱悲悔交生露瞻披肝慇懃懺謝謹扵厶𩂜結壇燃燈誦呪轉經捨財散食三日三夜芳等經云七日七夜鈴梵鳴音念崇聲無息伏如上靈聖是眾生父母尊仰所有告至誠皆蒙獲益今並離扵所樂發歡喜心賜大慈悲不違所請龍飛雨驟電擊雷奔眷属随相深生済拔乗空著地感動山川来就道塲證盟㓛徳自弟子厶甲乃捨割𥝠己抽捨淨財獻仏施僧廣𥘨品壇安像請僧轉經䖍仰能仁済危敷苦香果万般飲食散而湏無窮種五穀錢財施而塵沙不𥁞銀盤花動紅蓮捧而昭歸金瓶水流大海飲而無竭所有年裏困厄随呪聲而霞消日瘴時灾經音而霧散怨家債主歡喜相辤負命掌恩永𠇲讎對敬礼常住三寶然後誦勸請發文以此結壇轉經㓛德誦呪散食勝因燃燈供養等偈錢財五穀福牽先奉為龍天八部護國護人釋梵四王凃除法輪常轉仏日重興社安寧豐盈稼積又持福次用㽵嚴弟子厶甲即軆惟滄溟比壽富貴而山岳無移福竝松筠貞實而春冬不變門興万善千祥膺而長榮家謙三𮏂百寶鎮而永固男忠女孝灾殃不近扵義行子貴孫昌禍𡧱無扵善先七祖蓮花𨒦而登天不歷三塗祥雲乗而證果家中若大若小受金剛不壞之身拔眷內親外親共保清平之樂莊盈五穀霜疸不扵田苗圈滿群昌六畜無灾扵牧廡怨親債主早已𠇲讎負命負財為生罷散敬礼常住三寶然後呪師自擎盤取三發呪印加持便送出第二盤食右弟子厶甲旬結壇散食誦呪轉經焚香燃燈三日三夜者遂請下方窈冥神理隂道官寮閻魔羅王察命司錄太山府主五道大神左膊右肩善𢙣童子鑒㪰巡使行道天王吸氣𠬧魂判命主吏六司都長行病鬼王內外通申諸方獄卒又請四神八將十二部官太歲將軍日遊月建黑赤星神山靈異水陸神仙宮殿非人樓臺魍魎等并諸眷属並捨扵所樂離扵所居来就道塲領斯福分弟子自云凢夫迷闇每犯聖賢行住中間于日月神理今始覺悟遂結香壇散食燃燈轉經誦呪伏諸大神聖發慈悲救護生領受呪供錢財花果五穀香藥各生歡喜共開福門三灾不行扵道塲之家九撗無扵增善戶千年衛護長似今晨万歲吉祥轉禍為福敬礼常住三寶又弟子某甲自従无量刼来至扵今日或有積主辜負或是見𠀍新熏所有債主怨家負財買命或是經山採獵手射傍生或是涉草歡遊烹扵𤡢獸又請諸餘俘遊浪鬼因祀妖精杇樹丘墳擅行魍魎𢙣鬼毒主走火邪䰟巡歷街坊吸人精氣或有断親絕嗣不葬鬼或有離鄉失土波送鬼或有犯官驚魂鬼賊血醒鬼或是深泉溺死鬼大火燒然鬼或有無粮餓死鬼冬寒凍鬼散而湏有餘錢財万般用而寶山無盡金瓶香水飲而四海不傾銀盞神燈照而三𡍼俱曉祥花𢿘種持而天堂戶開月桂仙香焚而鑊湯火㓕汝承此㓛徳早遇龍花永離人間莫生𢙉𡧱𠬧弟子某甲三灾九撗遠送他方除弟子厶甲月厄年衰轉禍為福生世長為善品枝羅世生永保乃興人貴㝠官自在記錄福囙照此一家永安三代敬礼常住三寶閻文百姓尚善住遊扵都信捉水磑所存鐧在前自捉已後便湏晝夜存心不其顯春秋湏扵扵𢿘填如若扵捉磑人家用充顯祝用以為後憑捉磑戶高貟友見人兄高貟实癸丑年正月廿三日捉磑戶高貟友管會壬子并周年㳂磑諸𩂜破用及矜廗外欠麦碩壹㪷並在貟友身上限日便湏填還引用為後憑欠顆人高貟友口承人姪高保德
